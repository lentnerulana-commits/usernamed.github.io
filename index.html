<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Love Is</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <div class="title">
        с днем рождения<br>
        любовь моя 💗
    </div>

    <div class="card">

        <!-- ФОТКА -->

        <div class="image-box">

            <img id="lovePhoto"
                 src="img/photo.jpg"
                 alt="">

        </div>

        <!-- КНОПКИ -->

        <button class="btn pink"
                onclick="openGum()">

            Открыть жвачку

        </button>

        <button class="btn white"
                onclick="heartEffect(); nextPhoto()">

            жмякни

        </button>

        <!-- ТЕКСТ -->

        <div class="bottom">

            Нажимай «жмякни»,<br>
            чтобы увидеть другую обёртку 💌

        </div>

    </div>

</div>

<script>

const images = [

    "img/photo.jpg",

    "img/photo1.jpg",
    "img/photo2.jpg",
    "img/photo3.jpg",
    "img/photo4.jpg",
    "img/photo5.jpg",
    "img/photo6.jpg",
    "img/photo7.jpg",
    "img/photo8.jpg",
    "img/photo9.jpg",
    "img/photo10.jpg"

];

let current = 0;

/* СТАРТОВОЕ ФОТО */

window.onload = function(){

    document.getElementById("lovePhoto").src =
        images[0];

};

/* ОТКРЫТЬ ЖВАЧКУ */

function openGum(){

    current = 1;

    document.getElementById("lovePhoto").src =
        images[current];

}

/* СМЕНА ФОТО */

function nextPhoto(){

    current++;

    if(current >= images.length){

        current = 1;

    }

    document.getElementById("lovePhoto").src =
        images[current];

}

/* СЕРДЕЧКИ */

function heartEffect(){

    const count = 80; // 💗 много сердечек

    for(let i = 0; i < count; i++){

        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💗";

        // стартовая позиция — центр экрана
        heart.style.left = (window.innerWidth / 2) + "px";
        heart.style.top = (window.innerHeight / 2) + "px";

        heart.style.position = "fixed"; // важно: летят по всему экрану

        heart.style.fontSize = (15 + Math.random() * 30) + "px";

        // случайное направление разлёта
        const x = (Math.random() - 0.5) * 800; // влево/вправо
        const y = (Math.random() - 1) * 800;   // вверх сильнее

        heart.style.setProperty("--x", x + "px");
        heart.style.setProperty("--y", y + "px");

        heart.style.animation = "flyBig 2s ease-out forwards";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 2000);
    }
}

</script>

</body>
</html>
